  <!-- index.html -->
<!-- index.html -->
<script src="https://js.pusher.com/7.0/pusher.min.js"></script>
<script type="text/javascript">
  let pusher;
  let channel;

  function initializePusher(userId) {
    pusher = new Pusher('461f10be7b84c1ef6776', {
      cluster: 'eu'
    });

    channel = pusher.subscribe('User.' + userId);
    channel.bind('notification', function (data) {
      window.dispatchEvent(new CustomEvent('notification', { detail: data }));
    });

    pusher.connection.bind('disconnected', function () {
      console.log('Pusher disconnected');
    });
  }

  function disposePusher() {
    if (channel) {
      channel.unbind('notification');
      pusher.unsubscribe('User.' + userId);
      pusher.disconnect();
      console.log("Pusher disconnected and channel unsubscribed");
    }
  }
</script>
</head>
<body>
  <script>
    let useHtml = true; // Set to true for HTML renderer, false for CanvasKit renderer
    window.addEventListener('load', function (ev) {
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: serviceWorkerVersion,
        },
        onEntrypointLoaded: function (engineInitializer) {
          let config = {
            renderer: useHtml ? "html" : "canvaskit",
          };
          engineInitializer.initializeEngine(config).then(function (appRunner) {
            appRunner.runApp();
          });
        },
      });
    });
  </script>
</body>
